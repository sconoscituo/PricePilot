version: "3.9"

services:
  app:
    build: .
    container_name: pricepilot_app
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./pricepilot.db:/app/pricepilot.db
    env_file:
      - .env
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
